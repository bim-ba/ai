name: advisory smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # nightly 06:00 UTC

jobs:
  skill-matrix:
    name: opencode free-model skill-load matrix
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.12'
      - name: Guard — require OPENROUTER_API_KEY
        id: guard
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "OPENROUTER_API_KEY not set — skipping skill-load matrix." >> "$GITHUB_STEP_SUMMARY"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install opencode
        if: steps.guard.outputs.run == 'true'
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"
      - name: Run the skill-load matrix across popular free models
        if: steps.guard.outputs.run == 'true'
        timeout-minutes: 15
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: uv run --no-project scripts/model-matrix-check.py | tee -a "$GITHUB_STEP_SUMMARY"
