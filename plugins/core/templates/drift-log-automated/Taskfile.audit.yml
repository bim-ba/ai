version: '3'

# Drift-log audit tasks — include this file in your root Taskfile.yml:
#
#   includes:
#     audit: .claude/drift-log/Taskfile.audit.yml
#
# Then run individual checks:
#   go-task audit:drift-index-sync
#   go-task audit:stale-open
#   go-task audit:stale-applied
#   go-task audit:mechanical     # all three, sequential
#
# If your project has a dedicated check engine (e.g. `uv run check`), replace
# the shell implementations below with the appropriate engine invocations.
# The tasks, semantics, and finding format stay the same.

vars:
  DRIFT_DIR: '{{.ROOT_DIR}}/.claude/drift-log'

tasks:

  drift-index-sync:
    desc: Flag open/ entries missing from the README OPEN index, and index links with no file
    # Emits human-readable findings; exit 1 if any found.
    # Shell: bash (required for process substitution and bash-isms used below).
    cmds:
      - |
        #!/usr/bin/env bash
        set -euo pipefail
        DRIFT_DIR="{{.DRIFT_DIR}}"
        README="$DRIFT_DIR/README.md"
        OPEN_DIR="$DRIFT_DIR/open"
        FINDINGS=0

        # 1. Every open/ entry must appear in the README ## OPEN section.
        if [ -d "$OPEN_DIR" ]; then
          for f in "$OPEN_DIR"/*.md; do
            [ -e "$f" ] || continue
            b="$(basename "$f")"
            if ! grep -qF "open/$b" "$README" 2>/dev/null; then
              echo "HIGH [drift-index-sync] open/ entry missing from README OPEN index: $b"
              echo "  -> Add its summary line to ## OPEN (see drift-log/README.md § Creating a new entry)"
              FINDINGS=$((FINDINGS + 1))
            fi
          done
        fi

        # 2. Every link in the README ## OPEN section must resolve to a real file.
        # Use process substitution (bash) to keep FINDINGS in the current shell — a
        # pipeline subshell would discard any increments and the exit-1 gate would
        # never fire for this check.
        if [ -f "$README" ]; then
          while read -r link; do
            if [ ! -e "$DRIFT_DIR/$link" ]; then
              echo "HIGH [drift-index-sync] README OPEN index links a missing file: $link"
              echo "  -> Remove the stale index line, or restore the file (it may have been moved to applied/)"
              FINDINGS=$((FINDINGS + 1))
            fi
          done < <(grep -oE 'open/[0-9][^)]+\.md' "$README" | sort -u)
        fi

        if [ "$FINDINGS" -gt 0 ]; then
          exit 1
        fi
        echo "drift-index-sync: OK"

  stale-open:
    desc: Surface OPEN drift entries overdue for priority-weighted triage (on-demand, not a gate)
    # Thresholds: HIGH > 7d, MEDIUM > 21d, LOW > 60d past date: in frontmatter.
    # Does NOT exit 1 — informational, meant to be run on-demand or in audit:mechanical.
    # Shell: bash (required for bash-isms: ${b:0:10}, ${priority^^}, [[ … ]]).
    cmds:
      - |
        #!/usr/bin/env bash
        set -euo pipefail
        OPEN_DIR="{{.DRIFT_DIR}}/open"
        [ -d "$OPEN_DIR" ] || { echo "stale-open: no open/ dir, skipping"; exit 0; }

        TODAY="$(date +%Y-%m-%d)"
        today_epoch=$(date -d "$TODAY" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$TODAY" +%s)
        FINDINGS=0

        for f in "$OPEN_DIR"/*.md; do
          [ -e "$f" ] || continue
          b="$(basename "$f")"
          [[ "$b" == _* ]] && continue

          # Extract date: from frontmatter (between first and second --- delimiters).
          entry_date=$(awk '/^---$/{c++; if (c==2) exit; next} c==1 && /^date:/{print $2; exit}' "$f")
          # Fallback: parse date from filename prefix YYYY-MM-DD-
          if [ -z "$entry_date" ]; then
            entry_date="${b:0:10}"
          fi

          priority=$(awk '/^---$/{c++; if (c==2) exit; next} c==1 && /^priority:/{print $2; exit}' "$f")
          priority="${priority^^}"  # uppercase

          case "$priority" in
            HIGH)     threshold=7   ;;
            MEDIUM)   threshold=21  ;;
            LOW)      threshold=60  ;;
            *)        continue      ;;
          esac

          entry_epoch=$(date -d "$entry_date" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$entry_date" +%s 2>/dev/null || echo "")
          [ -z "$entry_epoch" ] && continue
          age_days=$(( (today_epoch - entry_epoch) / 86400 ))

          if [ "$age_days" -gt "$threshold" ]; then
            echo "$priority [stale-open] OPEN $priority drift aged ${age_days}d > ${threshold}d triage threshold: $b"
            echo "  -> Triage it (resolve / refile / drop) per drift-log/README.md § Triage cadence"
            FINDINGS=$((FINDINGS + 1))
          fi
        done

        if [ "$FINDINGS" -eq 0 ]; then
          echo "stale-open: OK (no overdue OPEN entries)"
        fi

  stale-applied:
    desc: Flag overdue drift-log compaction and applied entries missing a disposition (on-demand, not a gate)
    # Compaction threshold: >= 50 applied entries not covered by any INDEX-*.md,
    # or oldest uncovered entry > 6 months old.
    # disposition-missing: any applied/*.md lacking disposition: applied|already-done|dropped|refiled
    # Shell: bash (required for bash-isms: ${b:0:10}, [[ … ]]).
    cmds:
      - |
        #!/usr/bin/env bash
        set -euo pipefail
        APPLIED_DIR="{{.DRIFT_DIR}}/applied"
        [ -d "$APPLIED_DIR" ] || { echo "stale-applied: no applied/ dir, skipping"; exit 0; }

        COMPACTION_THRESHOLD=50
        MAX_AGE_DAYS=183
        VALID_DISPOSITIONS="applied already-done dropped refiled"
        FINDINGS=0

        # Collect all entry filenames covered by any INDEX-*.md
        covered_tmp=$(mktemp)
        trap 'rm -f "$covered_tmp"' EXIT
        for idx in "$APPLIED_DIR"/INDEX-*.md; do
          [ -e "$idx" ] || continue
          grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}-[^)[:space:]]+\.md' "$idx" >> "$covered_tmp" || true
        done
        sort -u "$covered_tmp" -o "$covered_tmp"

        TODAY="$(date +%Y-%m-%d)"
        today_epoch=$(date -d "$TODAY" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$TODAY" +%s)

        uncovered_count=0
        oldest_age=0

        for f in "$APPLIED_DIR"/*.md; do
          [ -e "$f" ] || continue
          b="$(basename "$f")"
          [[ "$b" == INDEX* ]] && continue

          # --- disposition-missing check ---
          disposition=$(awk '/^---$/{c++; if (c==2) exit; next} c==1 && /^disposition:/{print $2; exit}' "$f")
          valid=0
          for d in $VALID_DISPOSITIONS; do
            [ "$disposition" = "$d" ] && valid=1 && break
          done
          if [ "$valid" -eq 0 ]; then
            echo "MED [stale-applied] applied entry missing a valid disposition (got: '${disposition:-<empty>}'): $b"
            echo "  -> Add disposition: one of applied|already-done|dropped|refiled (see README § Disposition)"
            FINDINGS=$((FINDINGS + 1))
          fi

          # --- compaction coverage check ---
          if ! grep -qxF "$b" "$covered_tmp" 2>/dev/null; then
            uncovered_count=$((uncovered_count + 1))
            entry_date="${b:0:10}"
            entry_epoch=$(date -d "$entry_date" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$entry_date" +%s 2>/dev/null || echo "")
            if [ -n "$entry_epoch" ]; then
              age=$(( (today_epoch - entry_epoch) / 86400 ))
              [ "$age" -gt "$oldest_age" ] && oldest_age=$age
            fi
          fi
        done

        rm -f "$covered_tmp"

        if [ "$uncovered_count" -ge "$COMPACTION_THRESHOLD" ] || [ "$oldest_age" -gt "$MAX_AGE_DAYS" ]; then
          echo "MED [stale-applied] compaction due: ${uncovered_count} applied entries not covered by any INDEX-*.md (threshold ${COMPACTION_THRESHOLD}), oldest uncovered ~${oldest_age}d"
          echo "  -> Run a compaction pass: write applied/INDEX-<YYYY-MM>.md grouped by theme (see README § Compaction)"
          FINDINGS=$((FINDINGS + 1))
        fi

        if [ "$FINDINGS" -eq 0 ]; then
          echo "stale-applied: OK"
        fi

  mechanical:
    desc: Run all drift-log audit checks (drift-index-sync, stale-open, stale-applied); all three always run and report
    cmds:
      - task: drift-index-sync
        ignore_error: true
      - task: stale-open
      - task: stale-applied
